<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerName mail.rhthr.com
	DocumentRoot /var/www/null
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
	SSLEngine on
	SSLCertificateFile /etc/letsencrypt/live/rhthr.com/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/rhthr.com/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf
	<Directory /var/www/null>
		Require all denied
	</Directory>
	ErrorDocument 403 "Acesso negado"
</VirtualHost>
</IfModule>